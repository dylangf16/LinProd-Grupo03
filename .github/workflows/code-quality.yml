name: Code Quality

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  # ─── Job 1: Autoformatea y hace commit si hay cambios ───────────────────────
  autoformat:
    name: Autoformat (Black + isort)
    runs-on: ubuntu-latest
    permissions:
      contents: write   # necesario para el commit automático

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install formatters
        run: pip install black isort

      - name: Run Black
        run: black .

      - name: Run isort
        run: isort .

      - name: Commit formatting changes (si hubo)
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "style: autoformat with Black and isort"
          commit_author: "github-actions[bot] <github-actions[bot]@users.noreply.github.com>"

  # ─── Job 2: Análisis estático (no modifica código, solo reporta) ────────────
  lint:
    name: Lint (Flake8 + Pylint)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install linters
        run: pip install flake8 pylint

      - name: Flake8 — estilo y errores simples
        run: flake8 . --max-line-length=88 --extend-ignore=E203,W503

      - name: Pylint — análisis profundo
        run: |
          pylint **/*.py \
            --fail-under=7.0 \
            --disable=C0114,C0116,C0103
